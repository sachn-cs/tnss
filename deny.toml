# cargo-deny configuration
# See: https://embarkstudios.github.io/cargo-deny/
#
# License policy: this crate is MIT OR Apache-2.0.  We allow permissive
# OSI-approved licenses and explicitly permit LGPL-3.0-or-later (used by
# rug / gmp-mpfr-sys) and Unicode-3.0 (used by unicode-ident).  Copyleft
# dependencies trigger a warning so they can be reviewed before inclusion.

[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "LGPL-3.0-or-later",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
